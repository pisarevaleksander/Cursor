<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Interactive Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-5xl p-6 md:p-10">
      <header class="mb-8 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Interactive Todo Canvas</h1>
          <p class="mt-1 text-sm text-slate-400">Single-file HTML • Tailwind CDN • Vanilla JS • Drag & Drop</p>
        </div>
        <div class="rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-xs text-slate-300">
          <span id="task-counter">0 задач</span> · <span id="done-counter">0 выполнено</span>
        </div>
      </header>

      <section class="mb-6 rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <form id="task-form" class="grid gap-3 md:grid-cols-[1fr_auto_auto]">
          <input id="task-input" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm outline-none ring-indigo-400 placeholder:text-slate-500 focus:ring-2" placeholder="Добавьте задачу..." />
          <select id="priority-input" class="rounded-xl border border-slate-700 bg-slate-950 px-3 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
          <button class="rounded-xl bg-indigo-500 px-5 py-3 text-sm font-semibold text-white transition hover:bg-indigo-400">Добавить</button>
        </form>

        <div class="mt-4 flex flex-wrap gap-2">
          <button data-filter="all" class="filter-btn rounded-lg bg-slate-800 px-3 py-1.5 text-xs font-medium text-white">Все</button>
          <button data-filter="active" class="filter-btn rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-medium text-slate-300 ring-1 ring-slate-700">Активные</button>
          <button data-filter="done" class="filter-btn rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-medium text-slate-300 ring-1 ring-slate-700">Выполненные</button>
          <button id="clear-done" class="ml-auto rounded-lg bg-rose-500/20 px-3 py-1.5 text-xs font-medium text-rose-300 ring-1 ring-rose-500/30 hover:bg-rose-500/30">Очистить выполненные</button>
        </div>
      </section>

      <section class="grid gap-4 md:grid-cols-3">
        <div class="kanban rounded-2xl border border-slate-800 bg-slate-900/70 p-4" data-column="todo">
          <h2 class="mb-3 text-sm font-semibold text-slate-300">To do</h2>
          <div class="task-list min-h-[260px] space-y-2 rounded-xl border border-dashed border-slate-700 p-2"></div>
        </div>
        <div class="kanban rounded-2xl border border-slate-800 bg-slate-900/70 p-4" data-column="doing">
          <h2 class="mb-3 text-sm font-semibold text-slate-300">Doing</h2>
          <div class="task-list min-h-[260px] space-y-2 rounded-xl border border-dashed border-slate-700 p-2"></div>
        </div>
        <div class="kanban rounded-2xl border border-slate-800 bg-slate-900/70 p-4" data-column="done">
          <h2 class="mb-3 text-sm font-semibold text-slate-300">Done</h2>
          <div class="task-list min-h-[260px] space-y-2 rounded-xl border border-dashed border-slate-700 p-2"></div>
        </div>
      </section>
    </main>

    <template id="task-template">
      <article draggable="true" class="task group rounded-xl border border-slate-700 bg-slate-950 p-3 shadow-lg shadow-black/20">
        <div class="mb-2 flex items-start justify-between gap-3">
          <p class="task-text text-sm leading-5 text-slate-100"></p>
          <button class="delete-btn rounded-md px-2 py-0.5 text-xs text-slate-400 transition hover:bg-rose-500/20 hover:text-rose-300">✕</button>
        </div>
        <div class="flex items-center justify-between text-xs">
          <span class="priority rounded-full px-2 py-1 font-medium"></span>
          <label class="inline-flex items-center gap-1 text-slate-400">
            <input type="checkbox" class="done-checkbox accent-indigo-500" />
            done
          </label>
        </div>
      </article>
    </template>

    <script>
      const KEY = 'canvas_todo_tasks_v1';
      const form = document.getElementById('task-form');
      const input = document.getElementById('task-input');
      const priorityInput = document.getElementById('priority-input');
      const lists = Array.from(document.querySelectorAll('.task-list'));
      const filterButtons = Array.from(document.querySelectorAll('.filter-btn'));
      const clearDoneBtn = document.getElementById('clear-done');
      const taskCounter = document.getElementById('task-counter');
      const doneCounter = document.getElementById('done-counter');

      let tasks = loadTasks();
      let filter = 'all';
      let draggedId = null;

      function loadTasks() {
        try {
          return JSON.parse(localStorage.getItem(KEY)) || sampleTasks();
        } catch {
          return sampleTasks();
        }
      }

      function sampleTasks() {
        return [
          { id: uid(), text: 'Собрать UI в single-file HTML', priority: 'high', done: false, column: 'todo' },
          { id: uid(), text: 'Подключить Tailwind CDN', priority: 'medium', done: false, column: 'doing' },
          { id: uid(), text: 'Добавить drag-and-drop', priority: 'low', done: true, column: 'done' },
        ];
      }

      function uid() {
        return Math.random().toString(36).slice(2, 10);
      }

      function persist() {
        localStorage.setItem(KEY, JSON.stringify(tasks));
      }

      function getPriorityStyle(priority) {
        if (priority === 'high') return 'bg-rose-500/20 text-rose-300 ring-1 ring-rose-500/30';
        if (priority === 'medium') return 'bg-amber-500/20 text-amber-300 ring-1 ring-amber-500/30';
        return 'bg-emerald-500/20 text-emerald-300 ring-1 ring-emerald-500/30';
      }

      function passesFilter(task) {
        if (filter === 'active') return !task.done;
        if (filter === 'done') return task.done;
        return true;
      }

      function updateStats() {
        const done = tasks.filter(t => t.done).length;
        taskCounter.textContent = `${tasks.length} задач`;
        doneCounter.textContent = `${done} выполнено`;
      }

      function render() {
        lists.forEach(list => (list.innerHTML = ''));

        tasks
          .filter(passesFilter)
          .forEach((task) => {
            const tpl = document.getElementById('task-template').content.cloneNode(true);
            const el = tpl.querySelector('.task');
            const text = tpl.querySelector('.task-text');
            const badge = tpl.querySelector('.priority');
            const checkbox = tpl.querySelector('.done-checkbox');
            const deleteBtn = tpl.querySelector('.delete-btn');

            el.dataset.id = task.id;
            text.textContent = task.text;
            if (task.done) {
              text.classList.add('line-through', 'text-slate-500');
            }

            badge.textContent = task.priority;
            badge.className = `priority rounded-full px-2 py-1 font-medium ${getPriorityStyle(task.priority)}`;

            checkbox.checked = task.done;
            checkbox.addEventListener('change', () => {
              task.done = checkbox.checked;
              if (task.done) task.column = 'done';
              persist();
              render();
            });

            deleteBtn.addEventListener('click', () => {
              tasks = tasks.filter(t => t.id !== task.id);
              persist();
              render();
            });

            el.addEventListener('dragstart', () => {
              draggedId = task.id;
              el.classList.add('opacity-50');
            });
            el.addEventListener('dragend', () => {
              draggedId = null;
              el.classList.remove('opacity-50');
            });

            const list = document.querySelector(`[data-column="${task.column}"] .task-list`);
            if (list) list.appendChild(tpl);
          });

        updateStats();
      }

      document.querySelectorAll('.kanban').forEach((col) => {
        const list = col.querySelector('.task-list');

        list.addEventListener('dragover', (e) => {
          e.preventDefault();
          list.classList.add('ring-2', 'ring-indigo-500/70');
        });
        list.addEventListener('dragleave', () => {
          list.classList.remove('ring-2', 'ring-indigo-500/70');
        });
        list.addEventListener('drop', (e) => {
          e.preventDefault();
          list.classList.remove('ring-2', 'ring-indigo-500/70');
          if (!draggedId) return;
          const task = tasks.find((t) => t.id === draggedId);
          if (!task) return;
          task.column = col.dataset.column;
          task.done = task.column === 'done';
          persist();
          render();
        });
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        tasks.unshift({ id: uid(), text, priority: priorityInput.value, done: false, column: 'todo' });
        input.value = '';
        persist();
        render();
      });

      filterButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          filter = btn.dataset.filter;
          filterButtons.forEach((b) => {
            const active = b === btn;
            b.className = active
              ? 'filter-btn rounded-lg bg-slate-800 px-3 py-1.5 text-xs font-medium text-white'
              : 'filter-btn rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-medium text-slate-300 ring-1 ring-slate-700';
          });
          render();
        });
      });

      clearDoneBtn.addEventListener('click', () => {
        tasks = tasks.filter(t => !t.done);
        persist();
        render();
      });

      render();
    </script>
  </body>
</html>
